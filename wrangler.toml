name = "highline-stay"
main = "worker/index.js"
compatibility_date = "2024-09-25"
workers_dev = true

# Runs before `wrangler dev` / `wrangler deploy` so `./dist` exists even when CI only runs `npx wrangler deploy`.
[build]
command = "npm run build"

# React SPA built to dist/ via `npm run build`. Worker handles /api/* only; everything
# else is static assets + single-page-application fallback (client-side routing).
[assets]
directory = "./dist"
not_found_handling = "single-page-application"
# Invoke this Worker script only for API routes; all other URLs are served by assets first.
run_worker_first = [ "/api/*" ]

# Local dev: wrangler will create a local SQLite-backed D1 in .wrangler/.
# Remote: run `wrangler d1 create highline-stay` and paste the returned id below.
[[d1_databases]]
binding = "DB"
database_name = "highline-stay"
database_id = "2cbc1736-0d42-4223-8bc4-d8669709a4ae"
migrations_dir = "migrations"

[vars]
# Public/non-secret config. Override with `wrangler secret put` for sensitive ones.
ALLOWED_ORIGINS = "http://localhost:5173,http://127.0.0.1:5173,https://cloudflare-workers-autoconfig-highline-stay.dvigneshkumar99.workers.dev,https://highline-stay.dvigneshkumar99.workers.dev"
# Resend "from" must be a sender they allow. Use onboarding@resend.dev for dev/sandbox
# (only works for limited test sends per Resend docs). For production, verify your own domain
# in Resend and set FROM_EMAIL to e.g. noreply@yourdomain.com
FROM_EMAIL = "onboarding@resend.dev"
FROM_NAME = "Highline Luxurious Stay"
OTP_EXPIRY_MINUTES = "10"
OTP_MAX_ATTEMPTS = "5"
# When TEST_MODE = "true" the worker also returns the OTP in the response
# (handy for local dev before Resend is configured). Set to "false" in prod.
TEST_MODE = "true"